<script>
// ── Telegram WebApp init ───────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0a0f');
  tg.setBackgroundColor('#0a0a0f');
}

const API = "https://hypnotisable-mistier-tessa.ngrok-free.dev";
const TG_USER = tg?.initDataUnsafe?.user;

// ── state ──────────────────────────────────────────────────────
let currentPage    = 'home';
let currentTab     = 'new';
let playingId      = null;
let isPlaying      = false;
let tracks         = [];
let myBox          = [];
let currentAudio   = null;

const ACHIEVEMENTS = [
  { id:"listen_10",    emoji:"🎧", name:"Только начало!",         desc:"Прослушать 10 треков"       },
  { id:"likes_10",     emoji:"❤️", name:"Мне нравится!",          desc:"Поставить 10 лайков"        },
  { id:"box_10",       emoji:"📦", name:"Теперь это моё!",        desc:"Добавить 10 треков в ящик"  },
  { id:"suggest_5",    emoji:"📤", name:"Прочее → Поделиться...", desc:"Отправить 5 заявок"         },
  { id:"listen_50",    emoji:"🎵", name:"Музыка — моё всё!",      desc:"Прослушать 50 треков"       },
  { id:"likes_50",     emoji:"💖", name:"Я выбираю тебя!",        desc:"Поставить 50 лайков"        },
  { id:"box_50",       emoji:"🗃", name:"Цените мой выбор!",      desc:"Добавить 50 треков в ящик"  },
  { id:"donate_small", emoji:"💝", name:"Вип-персона!",            desc:"Пожертвовать 10-50 звёзд"   },
];

// ── API helpers ────────────────────────────────────────────────
async function apiFetch(path) {
  try {
    const res = await fetch(API + path, {
      headers: { "ngrok-skip-browser-warning": "true" }
    });
    return await res.json();
  } catch (e) {
    console.error("API error:", e);
    return null;
  }
}

// ── загрузка треков ────────────────────────────────────────────
async function loadTracks() {
  showToast("⏳ Загружаем треки...");
  const data = await apiFetch("/tracks?per_page=50");
  if (!data) { showToast("❌ Нет связи с сервером"); return; }

  // Загружаем лайки для каждого трека
  tracks = await Promise.all(data.tracks.map(async (t) => {
    const likesData = await apiFetch(`/tracks/${t.id}/likes`);
    return {
      ...t,
      performer: t.performer || "Unknown",
      likes: likesData?.likes ?? 0,
      liked: false  // лайки юзера — пока локально
    };
  }));

  document.getElementById('section-title').innerHTML =
    '🔥 НОВИНКИ <span>' + tracks.length + ' треков</span>';
  renderTracks([...tracks]);
  showToast("✅ Загружено " + tracks.length + " треков");
}

// ── воспроизведение ────────────────────────────────────────────
function playTrack(id) {
  const track = tracks.find(t => t.id === id);
  if (!track) return;

  // Если тот же трек — toggle play/pause
  if (playingId === id) {
    togglePlay();
    return;
  }

  // Останавливаем предыдущий
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  playingId = id;
  isPlaying = true;

  // Стримим через API
  currentAudio = new Audio(`${API}/tracks/${id}/stream`);
  currentAudio.play().catch(e => {
    showToast("❌ Ошибка воспроизведения");
    console.error(e);
  });
  currentAudio.onended = () => nextTrack();

  document.getElementById('np-title').textContent  = track.title;
  document.getElementById('np-artist').textContent = track.performer;
  document.getElementById('np-play-btn').textContent = '⏸';
  document.getElementById('now-playing').classList.add('visible');
  refreshCurrentTab();
  showToast('▶️ ' + track.performer + ' — ' + track.title);
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function togglePlay() {
  if (!currentAudio) return;
  isPlaying = !isPlaying;
  isPlaying ? currentAudio.play() : currentAudio.pause();
  document.getElementById('np-play-btn').textContent = isPlaying ? '⏸' : '▶️';
}

function prevTrack() {
  const idx = tracks.findIndex(t => t.id === playingId);
  if (idx > 0) playTrack(tracks[idx - 1].id);
}

function nextTrack() {
  const idx = tracks.findIndex(t => t.id === playingId);
  if (idx < tracks.length - 1) playTrack(tracks[idx + 1].id);
}

// ── render tracks ──────────────────────────────────────────────
function renderTracks(list, containerId = 'track-list') {
  const el = document.getElementById(containerId);
  if (!list.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">🎵</div>
      <div class="empty-text">Треков не найдено</div>
      <div class="empty-sub">Попробуй другой запрос</div>
    </div>`;
    return;
  }
  el.innerHTML = list.map((t, i) => {
    const playing = t.id === playingId;
    return `
    <div class="track-card ${playing ? 'playing' : ''}" onclick="playTrack(${t.id})">
      <div class="track-cover ${playing ? 'playing-anim' : ''}">
        <span class="note">🎵</span>
      </div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-artist">${t.performer}</div>
      </div>
      <div class="track-meta">
        <button class="like-btn ${t.liked ? 'liked' : ''}"
          onclick="event.stopPropagation(); toggleLike(${t.id})">
          ${t.liked ? '❤️' : '🤍'} ${t.likes}
        </button>
        <div class="track-num ${playing ? 'playing-bars' : ''}">
          ${playing
            ? '<div class="bar"></div><div class="bar"></div><div class="bar"></div>'
            : String(i+1).padStart(2,'0')}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── tabs ───────────────────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const searchWrap = document.getElementById('search-wrap');
  const title      = document.getElementById('section-title');

  if (tab === 'search') {
    searchWrap.style.display = 'block';
    title.style.display = 'none';
    renderTracks(tracks);
    document.getElementById('search-input').focus();
  } else {
    searchWrap.style.display = 'none';
    title.style.display = 'flex';
  }

  if (tab === 'new') {
    title.innerHTML = '🔥 НОВИНКИ <span>' + tracks.length + ' треков</span>';
    renderTracks([...tracks]);
  } else if (tab === 'top') {
    title.innerHTML = '⭐ ТОП <span>по лайкам</span>';
    renderTracks([...tracks].sort((a,b) => b.likes - a.likes));
  } else if (tab === 'box') {
    title.innerHTML = '📦 МОЙ ЯЩИК <span>' + myBox.length + ' треков</span>';
    renderTracks(tracks.filter(t => myBox.includes(t.id)));
  }
}

// ── search ─────────────────────────────────────────────────────
async function onSearch(val) {
  if (!val.trim()) { renderTracks(tracks); return; }
  const data = await apiFetch(`/tracks/search?q=${encodeURIComponent(val)}`);
  if (data) renderTracks(data.tracks.map(t => ({
    ...t,
    performer: t.performer || "Unknown",
    likes: 0, liked: false
  })));
}

// ── like (локально) ────────────────────────────────────────────
function toggleLike(id) {
  const track = tracks.find(t => t.id === id);
  if (!track) return;
  track.liked = !track.liked;
  track.likes += track.liked ? 1 : -1;
  refreshCurrentTab();
  showToast(track.liked ? '❤️ Лайк поставлен!' : '🤍 Лайк убран');
  if (tg) tg.HapticFeedback?.impactOccurred('medium');
}

function refreshCurrentTab() {
  const tabs = document.querySelectorAll('.tab');
  if (currentTab === 'new')    switchTab('new',    tabs[0]);
  else if (currentTab === 'top')  switchTab('top',    tabs[1]);
  else if (currentTab === 'box')  switchTab('box',    tabs[2]);
  else renderTracks(tracks);
}

// ── pages ──────────────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const homeEl    = document.getElementById('page-home');
  const profileEl = document.getElementById('page-profile');
  const tabsEl    = document.getElementById('tabs');
  const searchWrap= document.getElementById('search-wrap');

  homeEl.classList.remove('active');
  profileEl.classList.remove('active');

  const navMap = { home:'nav-home', search:'nav-search', box:'nav-box', profile:'nav-profile' };
  if (navMap[page]) document.getElementById(navMap[page])?.classList.add('active');

  if (page === 'profile') {
    profileEl.classList.add('active');
    tabsEl.style.display = 'none';
    searchWrap.style.display = 'none';
    renderProfile();
  } else {
    homeEl.classList.add('active');
    tabsEl.style.display = 'flex';
    if (page === 'search') {
      switchTab('search', document.querySelectorAll('.tab')[3]);
    } else if (page === 'box') {
      switchTab('box', document.querySelectorAll('.tab')[2]);
    } else {
      searchWrap.style.display = 'none';
      const newTab = document.querySelectorAll('.tab')[0];
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      newTab.classList.add('active');
      currentTab = 'new';
      document.getElementById('section-title').style.display = 'flex';
      document.getElementById('section-title').innerHTML =
        '🔥 НОВИНКИ <span>' + tracks.length + ' треков</span>';
      renderTracks([...tracks]);
    }
  }
}

// ── profile ────────────────────────────────────────────────────
function renderProfile() {
  if (TG_USER) {
    document.getElementById('p-name').textContent =
      TG_USER.first_name + (TG_USER.last_name ? ' ' + TG_USER.last_name : '');
    document.getElementById('p-handle').textContent =
      TG_USER.username ? '@' + TG_USER.username : 'TrackBox User';
  }
  document.getElementById('p-listens').textContent = tracks.length;
  document.getElementById('p-likes').textContent   = tracks.filter(t => t.liked).length;
  document.getElementById('p-box').textContent     = myBox.length;
  document.getElementById('p-days').textContent    = '—';

  const grid = document.getElementById('ach-grid');
  grid.innerHTML = ACHIEVEMENTS.map(a => `
    <div class="ach-card locked">
      <div class="ach-emoji">${a.emoji}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
      <div class="ach-badge">🔒 Заблокировано</div>
    </div>
  `).join('');
}

// ── toast ──────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── init ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', loadTracks);
</script>
