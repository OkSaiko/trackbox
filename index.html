<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>TrackBox</title>
  <script src="https://telegram.org/js/telegram-web-app.js"><\/script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --accent: #7c5cfc;
      --accent2: #fc5c7d;
      --text: #ffffff;
      --text2: #8888aa;
      --border: #ffffff12;
      --radius: 16px;
    }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; }

    /* ── APP SHELL ── */
    #app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

    /* ── HEADER ── */
    .header {
      padding: 12px 16px 8px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-logo { font-size:20px; font-weight:800; letter-spacing:-0.5px; }
    .header-logo span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    /* ── TABS ── */
    #tabs {
      display: flex; gap: 4px; padding: 8px 12px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      flex-shrink: 0; overflow-x: auto;
    }
    #tabs::-webkit-scrollbar { display:none; }
    .tab {
      padding: 6px 14px; border-radius: 20px; font-size:13px; font-weight:600;
      border: 1px solid var(--border); background: transparent; color: var(--text2);
      cursor: pointer; white-space: nowrap; transition: all .2s;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── SEARCH ── */
    #search-wrap { padding: 8px 12px; flex-shrink:0; display:none; }
    #search-input {
      width:100%; padding:10px 14px; border-radius:12px;
      background:var(--surface2); border:1px solid var(--border);
      color:var(--text); font-size:15px; outline:none;
    }
    #search-input::placeholder { color:var(--text2); }

    /* ── SECTION TITLE ── */
    #section-title {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 4px; font-size:13px; font-weight:700;
      color:var(--text2); text-transform:uppercase; letter-spacing:.5px; flex-shrink:0;
    }
    #section-title span { font-weight:400; font-size:12px; }

    /* ── PAGES ── */
    .page { display:none; flex:1; overflow-y:auto; }
    .page.active { display:flex; flex-direction:column; }
    .page::-webkit-scrollbar { display:none; }

    /* ── TRACK LIST ── */
    #track-list { padding: 4px 8px 100px; }

    .track-card {
      display:flex; align-items:center; gap:12px;
      padding:10px 10px; border-radius:var(--radius);
      cursor:pointer; transition:background .15s; margin-bottom:2px;
    }
    .track-card:active, .track-card.playing { background:var(--surface2); }

    .track-cover {
      width:46px; height:46px; border-radius:12px; flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:20px;
    }
    .track-cover.playing-anim { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

    .track-info { flex:1; min-width:0; }
    .track-title { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .track-artist { font-size:13px; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .track-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
    .like-btn {
      background:none; border:none; color:var(--text2); font-size:13px;
      cursor:pointer; padding:2px 6px; border-radius:8px; transition:all .15s;
    }
    .like-btn.liked { color:var(--accent2); }
    .track-num { font-size:12px; color:var(--text2); font-weight:600; }

    .playing-bars { display:flex; gap:2px; align-items:flex-end; height:14px; }
    .bar {
      width:3px; background:var(--accent); border-radius:2px;
      animation: bar-anim 0.8s ease-in-out infinite;
    }
    .bar:nth-child(2) { animation-delay:.2s; }
    .bar:nth-child(3) { animation-delay:.4s; }
    @keyframes bar-anim { 0%,100%{height:4px} 50%{height:14px} }

    .empty { text-align:center; padding:60px 20px; color:var(--text2); }
    .empty-icon { font-size:48px; margin-bottom:12px; }
    .empty-text { font-size:17px; font-weight:600; color:var(--text); margin-bottom:6px; }
    .empty-sub { font-size:14px; }

    /* ── NOW PLAYING ── */
    #now-playing {
      position:fixed; bottom:60px; left:8px; right:8px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:10px 14px;
      display:flex; align-items:center; gap:10px;
      transform:translateY(120%); transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index:100; box-shadow:0 8px 32px #0008;
    }
    #now-playing.visible { transform:translateY(0); }
    #np-cover {
      width:38px; height:38px; border-radius:10px; flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:18px;
    }
    #np-info { flex:1; min-width:0; }
    #np-title { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #np-artist { font-size:12px; color:var(--text2); }
    .np-controls { display:flex; gap:6px; align-items:center; }
    .np-btn {
      background:none; border:none; color:var(--text); font-size:20px;
      cursor:pointer; padding:4px; border-radius:8px; transition:opacity .15s;
    }
    .np-btn:active { opacity:.6; }
    #np-play-btn { font-size:24px; }

    /* ── PROFILE PAGE ── */
    #page-profile { padding:16px; gap:12px; }
    .profile-header {
      background:var(--surface); border-radius:var(--radius); padding:20px;
      display:flex; align-items:center; gap:14px;
    }
    .profile-avatar {
      width:60px; height:60px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center; font-size:28px;
    }
    .profile-name { font-size:18px; font-weight:700; }
    .profile-handle { font-size:14px; color:var(--text2); margin-top:2px; }

    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .stat-card {
      background:var(--surface); border-radius:var(--radius); padding:14px;
      text-align:center;
    }
    .stat-value { font-size:24px; font-weight:800; }
    .stat-label { font-size:12px; color:var(--text2); margin-top:2px; }

    .section-header { font-size:13px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }

    #ach-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding-bottom:80px; }
    .ach-card {
      background:var(--surface); border-radius:var(--radius); padding:14px;
      text-align:center; border:1px solid var(--border);
    }
    .ach-card.locked { opacity:.5; }
    .ach-emoji { font-size:28px; margin-bottom:6px; }
    .ach-name { font-size:13px; font-weight:700; margin-bottom:4px; }
    .ach-desc { font-size:11px; color:var(--text2); margin-bottom:6px; }
    .ach-badge { font-size:11px; color:var(--text2); }

    /* ── BOTTOM NAV ── */
    #nav {
      display:flex; background:var(--surface); border-top:1px solid var(--border);
      flex-shrink:0; z-index:200;
    }
    .nav-item {
      flex:1; display:flex; flex-direction:column; align-items:center;
      padding:8px 4px 10px; cursor:pointer; transition:color .15s;
      color:var(--text2); font-size:10px; gap:3px; border:none; background:none;
    }
    .nav-item.active { color:var(--accent); }
    .nav-icon { font-size:22px; }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
      background:#222233; color:#fff; padding:8px 18px; border-radius:20px;
      font-size:13px; opacity:0; transition:all .25s; z-index:999; white-space:nowrap;
      pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">Track<span>Box</span></div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <button class="tab active" onclick="switchTab('new', this)">🔥 Новинки</button>
    <button class="tab" onclick="switchTab('top', this)">⭐ Топ</button>
    <button class="tab" onclick="switchTab('box', this)">📦 Мой ящик</button>
    <button class="tab" onclick="switchTab('search', this)">🔍 Поиск</button>
  </div>

  <!-- SEARCH -->
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Поиск треков и артистов..."
      oninput="onSearch(this.value)"/>
  </div>

  <!-- SECTION TITLE -->
  <div id="section-title">🔥 НОВИНКИ <span>загрузка...</span></div>

  <!-- HOME PAGE -->
  <div id="page-home" class="page active">
    <div id="track-list"></div>
  </div>

  <!-- PROFILE PAGE -->
  <div id="page-profile" class="page">
    <div class="profile-header">
      <div class="profile-avatar">🎵</div>
      <div>
        <div class="profile-name" id="p-name">TrackBox User</div>
        <div class="profile-handle" id="p-handle">@user</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="p-listens">0</div>
        <div class="stat-label">Прослушано</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="p-likes">0</div>
        <div class="stat-label">Лайков</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="p-box">0</div>
        <div class="stat-label">В ящике</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="p-days">—</div>
        <div class="stat-label">Дней с нами</div>
      </div>
    </div>

    <div class="section-header">🏆 Достижения</div>
    <div id="ach-grid"></div>
  </div>

  <!-- NOW PLAYING -->
  <div id="now-playing">
    <div id="np-cover">🎵</div>
    <div id="np-info">
      <div id="np-title">—</div>
      <div id="np-artist">—</div>
    </div>
    <div class="np-controls">
      <button class="np-btn" onclick="prevTrack()">⏮</button>
      <button class="np-btn" id="np-play-btn" onclick="togglePlay()">⏸</button>
      <button class="np-btn" onclick="nextTrack()">⏭</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="nav">
    <button class="nav-item active" id="nav-home" onclick="showPage('home')">
      <span class="nav-icon">🏠</span>Главная
    </button>
    <button class="nav-item" id="nav-search" onclick="showPage('search')">
      <span class="nav-icon">🔍</span>Поиск
    </button>
    <button class="nav-item" id="nav-box" onclick="showPage('box')">
      <span class="nav-icon">📦</span>Ящик
    </button>
    <button class="nav-item" id="nav-profile" onclick="showPage('profile')">
      <span class="nav-icon">👤</span>Профиль
    </button>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── Telegram WebApp init ────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0a0f');
  tg.setBackgroundColor('#0a0a0f');
}

const API = "https://hypnotisable-mistier-tessa.ngrok-free.dev";
const TG_USER = tg?.initDataUnsafe?.user;

// ── state ────
let currentPage  = 'home';
let currentTab   = 'new';
let playingId    = null;
let isPlaying    = false;
let tracks       = [];
let myBox        = [];
let currentAudio = null;

const ACHIEVEMENTS = [
  { id:"listen_10",    emoji:"🎧", name:"Только начало!",         desc:"Прослушать 10 треков"      },
  { id:"likes_10",     emoji:"❤️", name:"Мне нравится!",          desc:"Поставить 10 лайков"       },
  { id:"box_10",       emoji:"📦", name:"Теперь это моё!",        desc:"Добавить 10 треков в ящик" },
  { id:"suggest_5",    emoji:"📤", name:"Прочее → Поделиться...", desc:"Отправить 5 заявок"        },
  { id:"listen_50",    emoji:"🎵", name:"Музыка — моё всё!",      desc:"Прослушать 50 треков"      },
  { id:"likes_50",     emoji:"💖", name:"Я выбираю тебя!",        desc:"Поставить 50 лайков"       },
  { id:"box_50",       emoji:"🗃", name:"Цените мой выбор!",      desc:"Добавить 50 треков в ящик" },
  { id:"donate_small", emoji:"💝", name:"Вип-персона!",           desc:"Пожертвовать 10-50 звёзд"  },
];

async function apiFetch(path) {
  try {
    const res = await fetch(API + path, { headers: { "ngrok-skip-browser-warning": "true" } });
    return await res.json();
  } catch (e) { console.error("API error:", e); return null; }
}

async function loadTracks() {
  showToast("⏳ Загружаем треки...");
  const data = await apiFetch("/tracks?per_page=50");
  if (!data) { showToast("❌ Нет связи с сервером"); return; }

  tracks = await Promise.all(data.tracks.map(async (t) => {
    const likesData = await apiFetch(`/tracks/${t.id}/likes`);
    return { ...t, performer: t.performer || "Unknown", likes: likesData?.likes ?? 0, liked: false };
  }));

  document.getElementById('section-title').innerHTML = '🔥 НОВИНКИ <span>' + tracks.length + ' треков</span>';
  renderTracks([...tracks]);
  showToast("✅ Загружено " + tracks.length + " треков");
}

function playTrack(id) {
  const track = tracks.find(t => t.id === id);
  if (!track) return;
  if (playingId === id) { togglePlay(); return; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  playingId = id; isPlaying = true;
  currentAudio = new Audio(`${API}/tracks/${id}/stream`);
  currentAudio.play().catch(e => { showToast("❌ Ошибка воспроизведения"); console.error(e); });
  currentAudio.onended = () => nextTrack();
  document.getElementById('np-title').textContent  = track.title;
  document.getElementById('np-artist').textContent = track.performer;
  document.getElementById('np-play-btn').textContent = '⏸';
  document.getElementById('now-playing').classList.add('visible');
  refreshCurrentTab();
  showToast('▶️ ' + track.performer + ' — ' + track.title);
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function togglePlay() {
  if (!currentAudio) return;
  isPlaying = !isPlaying;
  isPlaying ? currentAudio.play() : currentAudio.pause();
  document.getElementById('np-play-btn').textContent = isPlaying ? '⏸' : '▶️';
}

function prevTrack() {
  const idx = tracks.findIndex(t => t.id === playingId);
  if (idx > 0) playTrack(tracks[idx - 1].id);
}

function nextTrack() {
  const idx = tracks.findIndex(t => t.id === playingId);
  if (idx < tracks.length - 1) playTrack(tracks[idx + 1].id);
}

function renderTracks(list, containerId = 'track-list') {
  const el = document.getElementById(containerId);
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🎵</div><div class="empty-text">Треков не найдено</div><div class="empty-sub">Попробуй другой запрос</div></div>`;
    return;
  }
  el.innerHTML = list.map((t, i) => {
    const playing = t.id === playingId;
    return `<div class="track-card ${playing ? 'playing' : ''}" onclick="playTrack(${t.id})">
      <div class="track-cover ${playing ? 'playing-anim' : ''}"><span class="note">🎵</span></div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-artist">${t.performer}</div>
      </div>
      <div class="track-meta">
        <button class="like-btn ${t.liked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike(${t.id})">
          ${t.liked ? '❤️' : '🤍'} ${t.likes}
        </button>
        <div class="track-num ${playing ? 'playing-bars' : ''}">
          ${playing ? '<div class="bar"></div><div class="bar"></div><div class="bar"></div>' : String(i+1).padStart(2,'0')}
        </div>
      </div>
    </div>`;
  }).join('');
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const searchWrap = document.getElementById('search-wrap');
  const title = document.getElementById('section-title');
  if (tab === 'search') {
    searchWrap.style.display = 'block'; title.style.display = 'none';
    renderTracks(tracks); document.getElementById('search-input').focus();
  } else {
    searchWrap.style.display = 'none'; title.style.display = 'flex';
  }
  if (tab === 'new') { title.innerHTML = '🔥 НОВИНКИ <span>' + tracks.length + ' треков</span>'; renderTracks([...tracks]); }
  else if (tab === 'top') { title.innerHTML = '⭐ ТОП <span>по лайкам</span>'; renderTracks([...tracks].sort((a,b) => b.likes - a.likes)); }
  else if (tab === 'box') { title.innerHTML = '📦 МОЙ ЯЩИК <span>' + myBox.length + ' треков</span>'; renderTracks(tracks.filter(t => myBox.includes(t.id))); }
}

async function onSearch(val) {
  if (!val.trim()) { renderTracks(tracks); return; }
  const data = await apiFetch(`/tracks/search?q=${encodeURIComponent(val)}`);
  if (data) renderTracks(data.tracks.map(t => ({ ...t, performer: t.performer || "Unknown", likes: 0, liked: false })));
}

function toggleLike(id) {
  const track = tracks.find(t => t.id === id);
  if (!track) return;
  track.liked = !track.liked;
  track.likes += track.liked ? 1 : -1;
  refreshCurrentTab();
  showToast(track.liked ? '❤️ Лайк поставлен!' : '🤍 Лайк убран');
  if (tg) tg.HapticFeedback?.impactOccurred('medium');
}

function refreshCurrentTab() {
  const tabs = document.querySelectorAll('.tab');
  if (currentTab === 'new') switchTab('new', tabs[0]);
  else if (currentTab === 'top') switchTab('top', tabs[1]);
  else if (currentTab === 'box') switchTab('box', tabs[2]);
  else renderTracks(tracks);
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const homeEl = document.getElementById('page-home');
  const profileEl = document.getElementById('page-profile');
  const tabsEl = document.getElementById('tabs');
  const searchWrap = document.getElementById('search-wrap');
  homeEl.classList.remove('active'); profileEl.classList.remove('active');
  const navMap = { home:'nav-home', search:'nav-search', box:'nav-box', profile:'nav-profile' };
  if (navMap[page]) document.getElementById(navMap[page])?.classList.add('active');
  if (page === 'profile') {
    profileEl.classList.add('active'); tabsEl.style.display = 'none'; searchWrap.style.display = 'none';
    renderProfile();
  } else {
    homeEl.classList.add('active'); tabsEl.style.display = 'flex';
    if (page === 'search') { switchTab('search', document.querySelectorAll('.tab')[3]); }
    else if (page === 'box') { switchTab('box', document.querySelectorAll('.tab')[2]); }
    else {
      searchWrap.style.display = 'none';
      const newTab = document.querySelectorAll('.tab')[0];
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      newTab.classList.add('active'); currentTab = 'new';
      document.getElementById('section-title').style.display = 'flex';
      document.getElementById('section-title').innerHTML = '🔥 НОВИНКИ <span>' + tracks.length + ' треков</span>';
      renderTracks([...tracks]);
    }
  }
}

function renderProfile() {
  if (TG_USER) {
    document.getElementById('p-name').textContent = TG_USER.first_name + (TG_USER.last_name ? ' ' + TG_USER.last_name : '');
    document.getElementById('p-handle').textContent = TG_USER.username ? '@' + TG_USER.username : 'TrackBox User';
  }
  document.getElementById('p-listens').textContent = tracks.length;
  document.getElementById('p-likes').textContent = tracks.filter(t => t.liked).length;
  document.getElementById('p-box').textContent = myBox.length;
  document.getElementById('p-days').textContent = '—';
  const grid = document.getElementById('ach-grid');
  grid.innerHTML = ACHIEVEMENTS.map(a => `
    <div class="ach-card locked">
      <div class="ach-emoji">${a.emoji}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
      <div class="ach-badge">🔒 Заблокировано</div>
    </div>`).join('');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

document.addEventListener('DOMContentLoaded', loadTracks);
<\/script>
</body>
</html>
