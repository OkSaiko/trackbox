<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TrackBox</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  /* ── reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0f;
    --bg2:       #111118;
    --bg3:       #1a1a24;
    --card:      #14141e;
    --border:    rgba(255,255,255,0.07);
    --accent:    #7c5cfc;
    --accent2:   #fc5c7d;
    --accent-g:  linear-gradient(135deg, #7c5cfc, #fc5c7d);
    --text:      #f0f0f8;
    --muted:     #6b6b85;
    --success:   #4ade80;
    --radius:    16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  /* ── layout ───────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── header ───────────────────────────────────────────────── */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 10;
  }
  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    background: var(--accent-g);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-logo span { font-size: 18px; opacity: .6; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent-g);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── tabs ─────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 10px 20px;
    background: var(--bg);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all .2s;
  }
  .tab.active {
    background: var(--accent-g);
    border-color: transparent;
    color: #fff;
  }

  /* ── search ───────────────────────────────────────────────── */
  .search-wrap {
    padding: 0 20px 12px;
    flex-shrink: 0;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color .2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box svg { flex-shrink: 0; color: var(--muted); }
  .search-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
  }
  .search-box input::placeholder { color: var(--muted); }

  /* ── scroll area ──────────────────────────────────────────── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px 120px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg3) transparent;
  }
  .scroll-area::-webkit-scrollbar { width: 4px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* ── section title ────────────────────────────────────────── */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: var(--text);
    margin: 16px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title span { font-size: 14px; color: var(--muted); font-family: 'Manrope', sans-serif; letter-spacing: 0; }

  /* ── track card ───────────────────────────────────────────── */
  .track-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .track-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-g);
    opacity: 0;
    transition: opacity .2s;
  }
  .track-card:active::before { opacity: .05; }
  .track-card.playing {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(124,92,252,.2);
  }

  .track-cover {
    width: 52px; height: 52px;
    border-radius: var(--radius-sm);
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .track-cover .note {
    font-size: 22px;
    opacity: .4;
  }
  .track-cover.playing-anim::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-g);
    opacity: .3;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: .2; }
    50%       { opacity: .5; }
  }

  .track-info { flex: 1; min-width: 0; }
  .track-title {
    font-weight: 700;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .track-artist {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .like-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--muted);
    background: none; border: none; cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: all .15s;
  }
  .like-btn.liked { color: var(--accent2); }
  .like-btn:active { transform: scale(1.2); }
  .track-num {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    min-width: 20px;
    text-align: center;
  }
  .track-num.playing-bars {
    display: flex; align-items: flex-end; gap: 2px; height: 16px;
  }
  .bar {
    width: 3px; background: var(--accent);
    border-radius: 2px;
    animation: bars .8s ease-in-out infinite;
  }
  .bar:nth-child(2) { animation-delay: .2s; }
  .bar:nth-child(3) { animation-delay: .4s; }
  @keyframes bars {
    0%, 100% { height: 4px; }
    50%       { height: 14px; }
  }

  /* ── now playing bar ──────────────────────────────────────── */
  .now-playing {
    position: fixed;
    bottom: 64px;
    left: 50%; transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 448px;
    background: var(--bg3);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(124,92,252,.3);
    z-index: 50;
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
  }
  .now-playing.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: all;
  }
  .np-cover {
    width: 42px; height: 42px;
    border-radius: 8px;
    background: var(--accent-g);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .np-info { flex: 1; min-width: 0; }
  .np-title {
    font-weight: 700; font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .np-artist { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .np-controls { display: flex; gap: 8px; align-items: center; }
  .np-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    font-size: 16px;
  }
  .np-btn.play {
    background: var(--accent-g);
    box-shadow: 0 4px 12px rgba(124,92,252,.4);
  }
  .np-btn.play:active { transform: scale(.9); }
  .np-btn.secondary { background: var(--bg); color: var(--muted); }

  /* ── bottom nav ───────────────────────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 12px;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    cursor: pointer;
    padding: 4px;
    transition: all .15s;
  }
  .nav-icon { font-size: 22px; transition: transform .2s; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--muted); transition: color .2s; }
  .nav-item.active .nav-label { color: var(--accent); }
  .nav-item.active .nav-icon { transform: scale(1.15); }

  /* ── profile page ─────────────────────────────────────────── */
  .profile-hero {
    margin: 16px 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    text-align: center;
  }
  .profile-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--accent-g);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 12px;
    box-shadow: 0 8px 24px rgba(124,92,252,.4);
  }
  .profile-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
    background: var(--accent-g);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .profile-handle { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .profile-bio { font-size: 13px; color: var(--text); margin-top: 10px; opacity: .8; }
  .profile-stats {
    display: flex;
    gap: 1px;
    margin-top: 16px;
    background: var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .stat {
    flex: 1;
    background: var(--bg3);
    padding: 10px 8px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    background: var(--accent-g);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; font-weight: 600; }

  /* ── achievements ─────────────────────────────────────────── */
  .ach-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .ach-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: all .2s;
  }
  .ach-card.unlocked {
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(124,92,252,.15);
  }
  .ach-card.locked { opacity: .45; filter: grayscale(.5); }
  .ach-emoji { font-size: 26px; }
  .ach-name { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .ach-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .ach-badge {
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
    width: fit-content;
    background: var(--accent-g);
    color: #fff;
  }
  .ach-card.locked .ach-badge {
    background: var(--bg3);
    color: var(--muted);
  }

  /* ── empty state ──────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }
  .empty-text { font-size: 14px; font-weight: 600; }
  .empty-sub { font-size: 12px; margin-top: 6px; opacity: .7; }

  /* ── toast ────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    top: 16px; left: 50%; transform: translateX(-50%) translateY(-60px);
    background: var(--bg3);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 13px; font-weight: 600;
    color: var(--text);
    z-index: 1000;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── page visibility ──────────────────────────────────────── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── animations ───────────────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .track-card { animation: fadeUp .25s ease both; }
  .track-card:nth-child(1)  { animation-delay: .03s; }
  .track-card:nth-child(2)  { animation-delay: .06s; }
  .track-card:nth-child(3)  { animation-delay: .09s; }
  .track-card:nth-child(4)  { animation-delay: .12s; }
  .track-card:nth-child(5)  { animation-delay: .15s; }
  .track-card:nth-child(6)  { animation-delay: .18s; }
  .track-card:nth-child(7)  { animation-delay: .21s; }
  .track-card:nth-child(8)  { animation-delay: .24s; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">Track<span>Box</span></div>
    <div class="avatar" onclick="showPage('profile')">👤</div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs">
    <div class="tab active" onclick="switchTab('new', this)">🔥 Новинки</div>
    <div class="tab" onclick="switchTab('top', this)">⭐ Топ</div>
    <div class="tab" onclick="switchTab('box', this)">📦 Мой ящик</div>
    <div class="tab" onclick="switchTab('search', this)">🔍 Поиск</div>
  </div>

  <!-- SEARCH (hidden by default) -->
  <div class="search-wrap" id="search-wrap" style="display:none">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Название, исполнитель..." oninput="onSearch(this.value)"/>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">

    <!-- HOME PAGE -->
    <div class="page active" id="page-home">
      <div class="section-title" id="section-title">
        🔥 НОВИНКИ <span id="track-count"></span>
      </div>
      <div id="track-list"></div>
    </div>

    <!-- PROFILE PAGE -->
    <div class="page" id="page-profile">
      <div class="profile-hero">
        <div class="profile-avatar">🎧</div>
        <div class="profile-name" id="p-name">TrackBox User</div>
        <div class="profile-handle" id="p-handle">@username</div>
        <div class="profile-bio" id="p-bio">Люблю музыку 🎵</div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-val" id="p-listens">0</div>
            <div class="stat-label">ТРЕКОВ</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="p-likes">0</div>
            <div class="stat-label">ЛАЙКОВ</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="p-box">0</div>
            <div class="stat-label">В ЯЩИКЕ</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="p-days">1</div>
            <div class="stat-label">ДНЕЙ</div>
          </div>
        </div>
      </div>

      <div class="section-title">🏆 ДОСТИЖЕНИЯ</div>
      <div class="ach-grid" id="ach-grid"></div>
    </div>

  </div><!-- /scroll-area -->

  <!-- NOW PLAYING BAR -->
  <div class="now-playing" id="now-playing">
    <div class="np-cover">🎵</div>
    <div class="np-info">
      <div class="np-title" id="np-title">—</div>
      <div class="np-artist" id="np-artist">—</div>
    </div>
    <div class="np-controls">
      <button class="np-btn secondary" onclick="prevTrack()">⏮</button>
      <button class="np-btn play" id="np-play-btn" onclick="togglePlay()">▶️</button>
      <button class="np-btn secondary" onclick="nextTrack()">⏭</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="showPage('home')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Главная</div>
    </div>
    <div class="nav-item" id="nav-search" onclick="showPage('search')">
      <div class="nav-icon">🔍</div>
      <div class="nav-label">Поиск</div>
    </div>
    <div class="nav-item" id="nav-box" onclick="showPage('box')">
      <div class="nav-icon">📦</div>
      <div class="nav-label">Мой ящик</div>
    </div>
    <div class="nav-item" id="nav-profile" onclick="showPage('profile')">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Профиль</div>
    </div>
  </div>

</div><!-- /app -->

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── Telegram WebApp init ───────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0a0f');
  tg.setBackgroundColor('#0a0a0f');
}

// ── demo data (в реальной версии — запросы к боту) ─────────────
const DEMO_TRACKS = [
  { id:1,  title:"Jumanji",       performer:"Andy Panda, Miyagi, TumaniYO", likes:247, liked:false },
  { id:2,  title:"Aura",          performer:"Эндшпиль / onna badvibes",     likes:183, liked:true  },
  { id:3,  title:"Billboard",     performer:"Andy Panda",                   likes:312, liked:false },
  { id:4,  title:"Force",         performer:"Miyagi, Andy Panda feat. TumaniYO", likes:198, liked:false },
  { id:5,  title:"Mi Amor",       performer:"Эндшпиль / Ollane",            likes:156, liked:false },
  { id:6,  title:"My Babylon",    performer:"Эндшпиль",                     likes:134, liked:true  },
  { id:7,  title:"King Kong",     performer:"Andy Panda",                   likes:221, liked:false },
  { id:8,  title:"Orange Sunset", performer:"Andy Panda",                   likes:89,  liked:false },
  { id:9,  title:"Endorphin",     performer:"Andy Panda, Miyagi",           likes:176, liked:false },
  { id:10, title:"#ТАМАДА",       performer:"MiyaGi & Эндшпиль, Al'I Bo",  likes:298, liked:false },
];

const MY_BOX = [1, 2, 6];

const ACHIEVEMENTS = [
  { id:"listen_10",   emoji:"🎧", name:"Только начало!",        desc:"Прослушать 10 треков",          unlocked:true  },
  { id:"likes_10",    emoji:"❤️", name:"Мне нравится!",         desc:"Поставить 10 лайков",           unlocked:true  },
  { id:"box_10",      emoji:"📦", name:"Теперь это моё!",       desc:"Добавить 10 треков в ящик",     unlocked:false },
  { id:"suggest_5",   emoji:"📤", name:"Прочее → Поделиться...",desc:"Отправить 5 заявок",            unlocked:false },
  { id:"listen_50",   emoji:"🎵", name:"Музыка — моё всё!",     desc:"Прослушать 50 треков",          unlocked:false },
  { id:"likes_50",    emoji:"💖", name:"Я выбираю тебя!",       desc:"Поставить 50 лайков",           unlocked:false },
  { id:"box_50",      emoji:"🗃", name:"Цените мой выбор!",     desc:"Добавить 50 треков в ящик",     unlocked:false },
  { id:"donate_small",emoji:"💝", name:"Вип-персона!",           desc:"Пожертвовать 10-50 звёзд",      unlocked:false },
];

// ── state ──────────────────────────────────────────────────────
let currentPage   = 'home';
let currentTab    = 'new';
let playingId     = null;
let isPlaying     = false;
let tracks        = [...DEMO_TRACKS];
let filteredTracks= [...tracks];

// ── render tracks ──────────────────────────────────────────────
function renderTracks(list, containerId = 'track-list') {
  const el = document.getElementById(containerId);
  if (!list.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">🎵</div>
      <div class="empty-text">Треков не найдено</div>
      <div class="empty-sub">Попробуй другой запрос</div>
    </div>`;
    return;
  }
  el.innerHTML = list.map((t, i) => {
    const inBox   = MY_BOX.includes(t.id);
    const playing = t.id === playingId;
    return `
    <div class="track-card ${playing ? 'playing' : ''}" onclick="playTrack(${t.id})">
      <div class="track-cover ${playing ? 'playing-anim' : ''}">
        <span class="note">🎵</span>
      </div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-artist">${t.performer}</div>
      </div>
      <div class="track-meta">
        <button class="like-btn ${t.liked ? 'liked' : ''}"
          onclick="event.stopPropagation(); toggleLike(${t.id})">
          ${t.liked ? '❤️' : '🤍'} ${t.likes}
        </button>
        <div class="track-num ${playing ? 'playing-bars' : ''}">
          ${playing
            ? '<div class="bar"></div><div class="bar"></div><div class="bar"></div>'
            : String(i+1).padStart(2,'0')}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── tabs ───────────────────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const searchWrap = document.getElementById('search-wrap');
  const title      = document.getElementById('section-title');

  if (tab === 'search') {
    searchWrap.style.display = 'block';
    title.style.display = 'none';
    renderTracks(tracks);
    document.getElementById('search-input').focus();
  } else {
    searchWrap.style.display = 'none';
    title.style.display = 'flex';
  }

  if (tab === 'new') {
    title.innerHTML = '🔥 НОВИНКИ <span id="track-count">' + tracks.length + ' треков</span>';
    renderTracks([...tracks]);
  } else if (tab === 'top') {
    title.innerHTML = '⭐ ТОП <span id="track-count">по лайкам</span>';
    renderTracks([...tracks].sort((a,b) => b.likes - a.likes));
  } else if (tab === 'box') {
    title.innerHTML = '📦 МОЙ ЯЩИК <span id="track-count"></span>';
    const boxTracks = tracks.filter(t => MY_BOX.includes(t.id));
    document.getElementById('track-count').textContent = boxTracks.length + ' треков';
    renderTracks(boxTracks);
  }
}

// ── search ─────────────────────────────────────────────────────
function onSearch(val) {
  const q = val.toLowerCase();
  const res = q
    ? tracks.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.performer.toLowerCase().includes(q))
    : tracks;
  renderTracks(res);
}

// ── play ───────────────────────────────────────────────────────
function playTrack(id) {
  const track = tracks.find(t => t.id === id);
  if (!track) return;
  playingId = id;
  isPlaying = true;
  document.getElementById('np-title').textContent  = track.title;
  document.getElementById('np-artist').textContent = track.performer;
  document.getElementById('np-play-btn').textContent = '⏸';
  document.getElementById('now-playing').classList.add('visible');
  refreshCurrentTab();
  showToast('▶️ ' + track.performer + ' — ' + track.title);
  if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('np-play-btn').textContent = isPlaying ? '⏸' : '▶️';
}

function prevTrack() {
  const idx = tracks.findIndex(t => t.id === playingId);
  if (idx > 0) playTrack(tracks[idx - 1].id);
}

function nextTrack() {
  const idx = tracks.findIndex(t => t.id === playingId);
  if (idx < tracks.length - 1) playTrack(tracks[idx + 1].id);
}

// ── like ───────────────────────────────────────────────────────
function toggleLike(id) {
  const track = tracks.find(t => t.id === id);
  if (!track) return;
  track.liked = !track.liked;
  track.likes += track.liked ? 1 : -1;
  refreshCurrentTab();
  showToast(track.liked ? '❤️ Лайк поставлен!' : '🤍 Лайк убран');
  if (tg) tg.HapticFeedback?.impactOccurred('medium');
}

function refreshCurrentTab() {
  if (currentTab === 'new')    switchTab('new',    document.querySelector('.tab.active') || document.querySelector('.tab'));
  else if (currentTab === 'top') { const el = document.querySelectorAll('.tab')[1]; switchTab('top', el); }
  else if (currentTab === 'box') { const el = document.querySelectorAll('.tab')[2]; switchTab('box', el); }
  else renderTracks(tracks);
}

// ── pages ──────────────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const homeEl    = document.getElementById('page-home');
  const profileEl = document.getElementById('page-profile');
  const tabsEl    = document.getElementById('tabs');
  const searchWrap= document.getElementById('search-wrap');

  // reset
  homeEl.classList.remove('active');
  profileEl.classList.remove('active');

  const navMap = { home:'nav-home', search:'nav-search', box:'nav-box', profile:'nav-profile' };
  if (navMap[page]) document.getElementById(navMap[page])?.classList.add('active');

  if (page === 'profile') {
    profileEl.classList.add('active');
    tabsEl.style.display = 'none';
    searchWrap.style.display = 'none';
    renderProfile();
  } else {
    homeEl.classList.add('active');
    tabsEl.style.display = 'flex';
    if (page === 'search') {
      const searchTab = document.querySelectorAll('.tab')[3];
      switchTab('search', searchTab);
    } else if (page === 'box') {
      const boxTab = document.querySelectorAll('.tab')[2];
      switchTab('box', boxTab);
    } else {
      searchWrap.style.display = 'none';
      const newTab = document.querySelectorAll('.tab')[0];
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      newTab.classList.add('active');
      currentTab = 'new';
      document.getElementById('section-title').style.display = 'flex';
      document.getElementById('section-title').innerHTML =
        '🔥 НОВИНКИ <span>' + tracks.length + ' треков</span>';
      renderTracks([...tracks]);
    }
  }
}

// ── profile ────────────────────────────────────────────────────
function renderProfile() {
  // Telegram user info
  const user = tg?.initDataUnsafe?.user;
  if (user) {
    document.getElementById('p-name').textContent   = user.first_name + (user.last_name ? ' ' + user.last_name : '');
    document.getElementById('p-handle').textContent = user.username ? '@' + user.username : 'TrackBox User';
  }
  document.getElementById('p-listens').textContent = '12';
  document.getElementById('p-likes').textContent   = tracks.filter(t => t.liked).length;
  document.getElementById('p-box').textContent     = MY_BOX.length;
  document.getElementById('p-days').textContent    = '3';

  // achievements
  const grid = document.getElementById('ach-grid');
  grid.innerHTML = ACHIEVEMENTS.map(a => `
    <div class="ach-card ${a.unlocked ? 'unlocked' : 'locked'}">
      <div class="ach-emoji">${a.emoji}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
      <div class="ach-badge">${a.unlocked ? '✅ Получено' : '🔒 Заблокировано'}</div>
    </div>
  `).join('');
}

// ── toast ──────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── init ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('section-title').innerHTML =
    '🔥 НОВИНКИ <span>' + tracks.length + ' треков</span>';
  renderTracks([...tracks]);
});
</script>
</body>
</html>
